<html>
<head>
    <meta charset="utf-8">
    <title> Cadastro de pessoa </title>
    <link href="css/form.css" rel="stylesheet" type="text/css" media="screen" />
</head>

<body>
    <a href="index.php?class=CidadeList" style="font-size: 20px;" >voltar para lista</a>
    <form enctype="multipart/form-data" method="post" action="index.php?class=CidadeForm&method=save">
        <label>Código</label>
        <input name="id"  readonly="1" type="text" style="width: 30%" value="{id}">
        <label>Nome</label>
        <input name="nome" type="text" placeholder="Exemplo::.Maceio"  style="width: 50%" value="{nome}" required>
        <label>Estado</label>
        <select name="id_estado" style="width: 25%">
            {estados}
        </select>
        <input type="submit">
    </form>
</body>

</html>
