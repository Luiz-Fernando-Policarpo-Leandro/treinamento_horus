<html>
<head>
    <meta charset="utf-8">
    <title> Cadastro de pessoa </title>
    <link href="css/form.css" rel="stylesheet" type="text/css" media="screen" />
</head>

<body>
    <a href="index.php?class=EstadoList" style="font-size: 20px;" >voltar para lista</a>
    <form enctype="multipart/form-data" method="post" action="index.php?class=EstadoForm&method=save">
        <label>Código</label>
        <input name="id"  readonly="1" type="text" style="width: 30%" value="{id}">
        
        <label for="nome">Nome</label>
        <input name="nome" type="text" maxlength="25" placeholder="Exemplo::.São Paulo, Alagoas, Rio de Janeiro"  style="width: 50%" value="{nome}" required>

        <label for="sigla">Sigla</label>
        <input name="sigla" type="text" maxlength="2" placeholder="Exemplo::.SP, AL, RJ"  style="width: 50%" value="{sigla}" required>

        <input type="submit">
    </form>
</body>

</html>
